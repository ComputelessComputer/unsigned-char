name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/frontend_ci.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/frontend_ci.yml"
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
